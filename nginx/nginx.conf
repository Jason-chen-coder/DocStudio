upstream api_server {
    server api:3001;
}

upstream web_server {
    server web:3000;
}

upstream collab_server {
    server api:1234;
}

# ── HTTP: ACME challenge + 重定向 ────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME 验证（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 生产环境：取消下行注释以强制 HTTPS
    # return 301 https://$host$request_uri;

    # 开发/内网环境：直接代理（启用 HTTPS 后删除此行）
    include /etc/nginx/conf.d/proxy.conf;
}

