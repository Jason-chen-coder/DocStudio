upstream api_server {
    server api:3001;
}

upstream web_server {
    server web:3000;
}

upstream collab_server {
    server api:1234;
}

server {
    listen 80;
    server_name _;

    # 重定向所有 HTTP 到 HTTPS（生产环境取消注释）
    # return 301 https://$host$request_uri;

    # 开发/内网环境直接代理（生产环境删除此段，启用上方重定向）
    include /etc/nginx/conf.d/proxy.conf;
}

